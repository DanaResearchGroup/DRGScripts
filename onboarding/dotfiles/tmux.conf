# remap prefix to match screen
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on              # click panes, scroll, drag-resize
set -g history-limit 50000   # bigger scrollback
setw -g mode-keys vi         # vi keys in copy mode
set -g base-index 1          # windows start at 1, not 0
set -sg escape-time 0        # no delay after Esc (matters for vim/CC)
# --- session persistence across reboots (optional; needs tpm installed) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'                  # auto-restore on server start
set -g @resurrect-capture-pane-contents 'on'    # restore pane contents too
run '~/.tmux/plugins/tpm/tpm'                    # keep this line last
