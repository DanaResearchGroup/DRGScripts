name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install ruff
        run: pip install ruff
      - name: Byte-compile all scripts
        run: python -m compileall -q $(git ls-files '*.py')
      - name: Lint for real errors
        # Fail only on genuine bugs (syntax errors, undefined names),
        # not on style — this is a loose research-scripts repo.
        run: ruff check --select E9,F63,F7,F82 .

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        # Use the open-source CLI directly; the gitleaks-action wrapper now
        # requires a paid license for GitHub Organizations.
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        # Scan the working tree (not full history): a "don't add secrets" gate,
        # free of false positives from large base64 blobs in old commits.
        run: gitleaks dir --config .gitleaks.toml --redact --verbose .

  watchdog:
    name: cc-watchdog (shellcheck + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          shellcheck onboarding/watchdog/cc-deadman \
                     onboarding/watchdog/cc-stall-watchdog.sh \
                     onboarding/watchdog/install.sh \
                     onboarding/watchdog/test/run_tests.sh \
                     onboarding/watchdog/test/shims/*
      - name: unit tests
        run: onboarding/watchdog/test/run_tests.sh

  statusline:
    name: statusline (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck onboarding/statusline/install.sh
